name: Update Readme
on: 
    
    push:
        
    pull_request:

    schedule:
      - cron: '0 0 * * *'

    workflow_dispatch:
    
permissions:
  contents: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Setup
              uses: actions/setup-python@v3
              with:
                python-version: "3.13"
            - name: Replace and Update
              run: |
                python ./update_workflow/update.py
            - name: Push
              run: |
                git config user.name "Phineas Guo"
                git config user.email "31276761+guoPhineas@users.noreply.github.com"
                git add .
                if [[ -n $(git status --porcelain) ]]; then
                    git commit -m "Update Readme.md"
                    git push
                fi





